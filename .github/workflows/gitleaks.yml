name: Gitleaks Scan

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tải và chạy Gitleaks (Bỏ qua bản quyền)
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          ./gitleaks detect --source . --log-opts="origin/${{ github.base_ref }}..HEAD" -v
