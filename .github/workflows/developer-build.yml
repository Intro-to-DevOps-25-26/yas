name: developer_build

on:
  workflow_dispatch:
    inputs:
      dev_service:
        description: 'Service to deploy with custom branch'
        required: true
        type: choice
        options:
          - cart
          - customer
          - inventory
          - location
          - media
          - order
          - payment
          - payment-paypal
          - product
          - promotion
          - rating
          - recommendation
          - search
          - tax
          - webhook
          - storefront-bff
          - backoffice-bff
      dev_branch:
        description: 'Branch name (e.g., dev_tax_service)'
        required: true
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Validate branch exists
        id: sha
        run: |
          if git ls-remote --exit-code origin ${{ github.event.inputs.dev_branch }} > /dev/null 2>&1; then
            git fetch origin ${{ github.event.inputs.dev_branch }}
            SHA=$(git rev-parse FETCH_HEAD)
            echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: Branch '${{ github.event.inputs.dev_branch }}' does not exist on remote origin."
            exit 1
          fi

      - name: Read domain config
        id: config
        run: |
          echo "domain=$(yq -r '.domain' k8s/deploy/cluster-config.yaml)" >> "$GITHUB_OUTPUT"

      - name: Build Helm dependencies
        run: helm dependency build k8s/charts/${{ github.event.inputs.dev_service }}

      - name: Clear managedFields conflicts
        run: |
          kubectl patch deployment ${{ github.event.inputs.dev_service }} -n yas \
            --type json -p='[{"op": "remove", "path": "/metadata/managedFields"}]' || true

      - name: Deploy dev service with custom image tag + NodePort
        run: |
          helm upgrade --install ${{ github.event.inputs.dev_service }} \
            k8s/charts/${{ github.event.inputs.dev_service }} \
            --namespace yas --create-namespace \
            --set backend.image.repository=${{ secrets.DOCKER_USERNAME }}/yas-${{ github.event.inputs.dev_service }} \
            --set backend.image.tag=${{ steps.sha.outputs.sha }} \
            --set backend.service.type=NodePort \
            --set backend.ingress.enabled=false \
            --set backend.serviceMonitor.enabled=false

      - name: Get NodePort and node IP
        id: svc-info
        run: |
          NODE_PORT=$(kubectl get svc -n yas ${{ github.event.inputs.dev_service }} \
            -o jsonpath='{.spec.ports[0].nodePort}')
          NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[0].address}')
          echo "node_port=$NODE_PORT" >> "$GITHUB_OUTPUT"
          echo "node_ip=$NODE_IP" >> "$GITHUB_OUTPUT"

      - name: Output connection info
        run: |
          echo "## \u2705 Developer Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ github.event.inputs.dev_service }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.event.inputs.dev_branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image tag | ${{ steps.sha.outputs.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node IP | ${{ steps.svc-info.outputs.node_ip }} |" >> $GITHUB_STEP_SUMMARY
          echo "| NodePort | ${{ steps.svc-info.outputs.node_port }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Access URL | http://${{ steps.svc-info.outputs.node_ip }}:${{ steps.svc-info.outputs.node_port }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Thêm vào /etc/hosts:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.svc-info.outputs.node_ip }} ${{ github.event.inputs.dev_service }}.yas.local" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
