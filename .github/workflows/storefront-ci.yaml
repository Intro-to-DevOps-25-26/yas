name: storefront service ci

on:
  push:
    branches: [ "main" ]
    paths:
      - "storefront/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/storefront-ci.yaml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "storefront/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/storefront-ci.yaml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: storefront
      - run: npm run build
        working-directory: storefront
      - run: npm run lint
        working-directory: storefront
      - run: npx prettier --check .
        working-directory: storefront
      - name: SonarCloud Scan
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: storefront
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Docker tags
        id: docker-tags
        if: ${{ github.ref == 'refs/heads/main' }}
        shell: bash
        run: |
          BASE="ghcr.io/nashtech-garage/yas-storefront"
          TAGS="$BASE:${{ github.sha }}"
          TAGS="$TAGS,$BASE:latest"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./storefront
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
      - name: Export image metadata
        if: ${{ github.ref == 'refs/heads/main' }}
        shell: bash
        run: |
          set -euo pipefail
          cat > image-metadata-storefront.json <<EOF
          {
            "service": "storefront",
            "image_tag": "${{ github.sha }}",
            "image_ref": "ghcr.io/nashtech-garage/yas-storefront:${{ github.sha }}",
            "image_digest": "${{ steps.build.outputs.digest }}"
          }
          EOF

          {
            echo "## Image metadata for storefront"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Image tag | ${{ github.sha }} |"
            echo "| Image ref | ghcr.io/nashtech-garage/yas-storefront:${{ github.sha }} |"
            echo "| Image digest | ${{ steps.build.outputs.digest }} |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload image metadata artifact
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: image-metadata-storefront
          path: image-metadata-storefront.json
