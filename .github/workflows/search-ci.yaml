name: search service ci

on:
  push:
    branches: ["main"]
    paths:
      - "search/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/search-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "search/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/search-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  statuses: write
  checks: write

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean install -pl search -am -DskipITs=true
      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -pl search -am -Dcheckstyle.output.file=search-checkstyle-result.xml
      - name: Upload Checkstyle Result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/search-checkstyle-result.xml'
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Search-Service-Unit-Test-Results
          path: "search/**/*-reports/TEST*.xml"
          reporter: java-junit
      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f search -Dsonar.organization=intro-to-devops-25-26 -Dsonar.projectKey=intro-to-devops-25-26_yas-search
      - name: OWASP Dependency Check
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: 'yas'
          path: '.'
          format: 'HTML'
      - name: Upload OWASP Dependency Check results
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: actions/upload-artifact@master
        with:
          name: OWASP Dependency Check Report
          path: ${{github.workspace}}/reports
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        with:
          paths: ${{github.workspace}}/search/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 80
          min-coverage-changed-files: 60
          title: 'Search Coverage Report'
          update-comment: true
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Docker tags
        id: docker-tags
        if: ${{ github.ref == 'refs/heads/main' }}
        shell: bash
        run: |
          BASE="ghcr.io/nashtech-garage/yas-search"
          TAGS="$BASE:${{ github.sha }}"
          TAGS="$TAGS,$BASE:latest"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./search
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
      - name: Export image metadata
        if: ${{ github.ref == 'refs/heads/main' }}
        shell: bash
        run: |
          set -euo pipefail
          cat > image-metadata-search.json <<EOF
          {
            "service": "search",
            "image_tag": "${{ github.sha }}",
            "image_ref": "ghcr.io/nashtech-garage/yas-search:${{ github.sha }}",
            "image_digest": "${{ steps.build.outputs.digest }}"
          }
          EOF

          {
            echo "## Image metadata for search"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Image tag | ${{ github.sha }} |"
            echo "| Image ref | ghcr.io/nashtech-garage/yas-search:${{ github.sha }} |"
            echo "| Image digest | ${{ steps.build.outputs.digest }} |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload image metadata artifact
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: image-metadata-search
          path: image-metadata-search.json
