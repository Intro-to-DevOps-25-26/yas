apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backoffice-ui-dev
  namespace: argocd
spec:
  project: yas-dev
  source:
    repoURL: https://github.com/Intro-to-DevOps-25-26/yas.git
    targetRevision: main
    path: k8s/charts/backoffice-ui
    helm:
      releaseName: backoffice-ui
      values: |
        ui:
          image:
            digest: "sha256:6df1fddefec969e746ba5ef51235721c7f5de9e506e9ddd7e5a2c208a4af3855"
          service:
            type: NodePort
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-dev
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: false
