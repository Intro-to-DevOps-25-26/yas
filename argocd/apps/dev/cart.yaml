apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cart-dev
  namespace: argocd
spec:
  project: yas-dev
  source:
    repoURL: https://github.com/Intro-to-DevOps-25-26/yas.git
    targetRevision: main
    path: k8s/charts/cart
    helm:
      releaseName: cart
      values: |
        backend:
          image:
            digest: "sha256:16b351fd919079fbd2a1e22ab1190772c684302cb9f0c907800ebcaa01039329"
          serviceMonitor:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-dev
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: false
