backend:
  image:
    repository: devops2526/yas-search
    digest: sha256:47e54732261585da7f47089ced6105f775aafc0abbead1647de86ff90fa3969f
    tag: latest
  httpPort: 8092
  metricPort: 8092
  serviceMonitor:
    enabled: false

  nameOverride: search
  fullnameOverride: search
  databaseName: search
  ingress:
    enabled: false
  extraEnvFroms:
    - secretRef:
        name: yas-elasticsearch-credentials-secret
  extraVolumes:
    - name: search-application
      configMap:
        name: search-application-configmap
  extraVolumeMounts:
    - name: search-application
      mountPath: /opt/yas/search
  extraApplicationConfigPaths:
    - /opt/yas/search/search-application.yaml
  livenessProbe:
    periodSeconds: 10
    failureThreshold: 12
    successThreshold: 1
    httpGet:
      path: /search/actuator/health/liveness
      port: metric
  readinessProbe:
    periodSeconds: 10
    failureThreshold: 12
    successThreshold: 1
    httpGet:
      path: /search/actuator/health/readiness
      port: metric
  startupProbe:
    periodSeconds: 10
    failureThreshold: 30
    successThreshold: 1
    httpGet:
      path: /search/actuator/health/liveness
      port: metric
